<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Munkaidő PRO</title>

<style>
/* -------------------------
   ALAPSZÍNEK
-------------------------- */
:root {
  --bg:#0c0d10;
  --fg:#ffffff;
  --card:#16181d;
  --muted:#8a8f99;
  --accent:#3b82f6;
  --danger:#ef4444;
  --success:#22c55e;
}

/* -------------------------
   ALAP LAYOUT
-------------------------- */
body {
  margin:0;
  background:var(--bg);
  color:var(--fg);
  font-family:-apple-system,system-ui;
}

.app {
  padding:16px 14px 100px;
  max-width:900px;
  margin:auto;
}

.page { display:none; }
.page.active { display:block; }

/* -------------------------
   KÁRTYÁK
-------------------------- */
.card {
  background:var(--card);
  padding:18px;
  border-radius:22px;
  margin:18px 0;
  border:1px solid #1f2126;
}

.card-title {
  font-size:18px;
  font-weight:600;
  margin-bottom:12px;
}

/* -------------------------
   GOMBOK
-------------------------- */
button {
  width:100%;
  padding:14px;
  border-radius:16px;
  border:none;
  margin:8px 0;
  font-size:16px;
  color:#fff;
  font-weight:600;
  background:#2563eb;
}

.btn-start { background:#16a34a; }
.btn-break { background:#d97706; }
.btn-end { background:#dc2626; }

/* -------------------------
   INPUTOK
-------------------------- */
input {
  width:100%;
  padding:12px;
  border-radius:14px;
  border:1px solid #2a2d33;
  background:#0f1115;
  color:#fff;
  margin:6px 0;
  font-size:15px;
}

/* -------------------------
   RESET GOMB
-------------------------- */
.reset-top-btn {
    position: absolute;
    top: 12px;
    right: 16px;
    background: var(--card);
    color: var(--fg);
    border: 1px solid #1f2126;
    width: 38px;
    height: 38px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    cursor: pointer;
    z-index: 999;
}

/* -------------------------
   NAV
-------------------------- */
.bottom-nav {
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  background:#111318ee;
  backdrop-filter:blur(14px);
  display:flex;
  justify-content:space-between;
  padding:10px 12px;
  border-top:1px solid #2a2d33;
}

.nav-item {
  flex:1;
  text-align:center;
  color:var(--muted);
  padding:6px 0;
  border-radius:12px;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:2px;
}

.nav-item.active {
  color:#fff;
  background:#2563eb33;
}

.nav-icon { font-size:20px; }
.nav-label { font-size:11px; }

/* -------------------------
   NAPTÁR – EREDETI SÖTÉT TÉMA
-------------------------- */
#month-header {
  background:#16181d;
  color:#fff;
  border:1px solid #1f2126;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:14px 18px;
  border-radius:22px;
  margin-bottom:18px;
}

#month-header button {
  background:none;
  border:none;
  font-size:22px;
  cursor:pointer;
  color:#fff;
}

#month-title {
  font-size:18px;
  font-weight:600;
}

.day-summary-card {
  background:#16181d;
  color:#fff;
  border:1px solid #1f2126;
}

.day-summary-card .row {
  display:flex;
  justify-content:space-between;
  padding:6px 0;
  font-size:16px;
}

.day-summary-card .row span:first-child {
  color:#8a8f99;
}

.day-summary-card .row span:last-child {
  font-weight:600;
  color:#ffffff;
}

.overtime-positive { color:#22c55e; font-weight:700; }
.overtime-negative { color:#ef4444; font-weight:700; }

.calendar-card {
  background:#16181d;
  color:#fff;
  border:1px solid #1f2126;
}

#calendar {
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:6px;
  margin-top:12px;
}

.calendar-day {
  padding:10px 0;
  text-align:center;
  border-radius:10px;
  cursor:pointer;
  font-size:15px;
  background:#1b1d22;
  color:#fff;
  font-weight:500;
  position:relative;
}

.calendar-day.today::after {
  content:"";
  width:6px;
  height:6px;
  background:#ef4444;
  border-radius:50%;
  position:absolute;
  bottom:4px;
  left:50%;
  transform:translateX(-50%);
}

.calendar-day.selected {
  background:#2563eb;
  color:#fff;
  font-weight:700;
  box-shadow:0 0 0 2px #1e40af inset;
}

</style>

</head>
<body>

<div class="app">

<!-- MA OLDAL -->
<div id="page-home" class="page active">

    <div class="reset-top-btn" onclick="resetToday()">⟳</div>

    <div class="card">
      <div class="card-title">📊 Mai összegzés</div>
      <button class="btn-start" onclick="startWork()">▶ Munkakezdés</button>
      <button class="btn-break" onclick="startBreak()">☕ Szünet kezdete</button>
      <button class="btn-break" onclick="endBreak()">🔙 Szünet vége</button>
      <button class="btn-end" onclick="endWork()">⏹ Munka vége</button>
    </div>

    <div class="card">
      <div class="card-title">📄 Részletek</div>
      <div id="timeline"></div>
    </div>

    <div class="card">
      <div class="card-title">🎛 Mai összegzés</div>

      <div class="metric">Jelenlét</div>
      <div class="metric-value" id="today_presence">00:00:00</div>

      <div class="metric">Szünet</div>
      <div class="metric-value" id="today_breaks">00:00:00</div>

      <div class="metric">Túlóra</div>
      <div class="metric-value" id="today_overtime"></div>
    </div>

</div>

<!-- NAPTÁR OLDAL -->
<div id="page-calendar" class="page">

  <div id="month-header" class="card">
      <button onclick="prevMonth()">⬅️</button>
      <span id="month-title"></span>
      <button onclick="nextMonth()">➡️</button>
  </div>

  <div id="day-summary" class="card day-summary-card"></div>

  <div id="calendar" class="card calendar-card"></div>

</div>

<!-- TÚLÓRA OLDAL -->
<div id="page-overtime" class="page">

  <div class="card">
    <div class="card-title">🔧 App óraállás</div>
    <div id="lockStateBox" class="entry" style="text-align:center;font-weight:600;">
      🔒 Zárolva – feloldáshoz koppintson
    </div>
    <input id="appBalance" type="number" step="0.01" readonly>
    <button onclick="toggleLock()">🔓 Feloldás / Zárolás</button>
  </div>

  <div class="card">
    <div class="card-title">🏢 Céges óraállás</div>
    <input id="companyBalance" type="number" step="0.01" oninput="updateDifference()">
    <div class="entry">Különbség: <span id="balanceDiff">0.00</span></div>
  </div>

  <div class="card">
    <div class="card-title">📄 Napi túlórák</div>
    <div id="overtimeList"></div>
  </div>

  <div class="card">
    <div class="card-title">📊 Összesített túlóra</div>
    <div class="metric-value" id="totalOvertime">0.00</div>
  </div>

</div>

</div> <!-- app vége -->

<!-- NAV -->
<div class="bottom-nav">

  <div id="nav-page-home" class="nav-item active"
       onclick="showPage('page-home')">
      <div class="nav-icon">🏠</div>
      <div class="nav-label">Ma</div>
  </div>

  <div id="nav-page-calendar" class="nav-item"
       onclick="showPage('page-calendar'); initCalendarPage();">
      <div class="nav-icon">📅</div>
      <div class="nav-label">Naptár</div>
  </div>

  <div id="nav-page-overtime" class="nav-item"
       onclick="showPage('page-overtime')">
      <div class="nav-icon">⏱</div>
      <div class="nav-label">Túlóra</div>
  </div>

</div>

<script>
/* -------------------------
   ADATBÁZIS
-------------------------- */
let db = { 
    days:{}, 
    appBalance:0, 
    companyBalance:0, 
    locked:true 
};

/* -------------------------
   LOAD / SAVE
-------------------------- */
function loadDB(){
    let r = localStorage.getItem("munkapro_ios");
    if(r) db = JSON.parse(r);
    updateUI();
}

function saveDB(){
    localStorage.setItem("munkapro_ios", JSON.stringify(db));
    updateUI();
}

/* -------------------------
   OLDALVÁLTÁS
-------------------------- */
function showPage(id){
    document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
    document.getElementById(id).classList.add("active");

    document.querySelectorAll(".nav-item").forEach(n=>n.classList.remove("active"));
    document.getElementById("nav-"+id).classList.add("active");

    updateUI();
}

/* -------------------------
   SEGÉDFÜGGVÉNYEK
-------------------------- */
function today(){ return new Date().toISOString().slice(0,10); }
function now(){ return new Date().toTimeString().slice(0,8); }

function pad(n){ return n.toString().padStart(2,"0"); }

function diffTime(a,b){
    if(!a||!b) return 0;
    return (new Date("2000-01-01 "+b) - new Date("2000-01-01 "+a))/1000;
}

function format(s){
    let h = Math.floor(s/3600),
        m = Math.floor((s%3600)/60),
        x = s%60;
    return `${pad(h)}:${pad(m)}:${pad(x)}`;
}

function ensure(d){
    if(!db.days[d]){
        db.days[d] = {
            start:null,
            end:null,
            breaks:[],
            manualOvertime:undefined
        };
    }
    return db.days[d];
}

/* -------------------------
   MUNKA KEZDÉSE / VÉGE
-------------------------- */
function startWork(){
    let d = today();
    let day = ensure(d);

    if(day.start){
        alert("A munka már el van indítva.");
        return;
    }

    day.start = now();
    saveDB();
}

function endWork(){
    let d = today();
    let day = ensure(d);

    if(!day.start){
        alert("A munka még nincs elindítva.");
        return;
    }

    if(day.end){
        alert("A munka már le van zárva.");
        return;
    }

    if(day.breaks.some(b=>!b.end)){
        alert("Van nyitott szünet!");
        return;
    }

    day.end = now();
    saveDB();
}

/* -------------------------
   SZÜNET
-------------------------- */
function startBreak(){
    let d = today();
    let day = ensure(d);

    if(!day.start){
        alert("A munka még nincs elindítva.");
        return;
    }

    if(day.breaks.some(b=>!b.end)){
        alert("Már van egy nyitott szünet.");
        return;
    }

    day.breaks.push({start:now(), end:null});
    saveDB();
}

function endBreak(){
    let d = today();
    let day = ensure(d);

    let br = day.breaks;
    if(br.length && br[br.length-1].end===null){
        br[br.length-1].end = now();
        saveDB();
    } else {
        alert("Nincs nyitott szünet.");
    }
}

/* -------------------------
   RESET NAP
-------------------------- */
function resetToday(){
    let d = today();
    delete db.days[d];
    saveDB();
    location.reload();
}

/* -------------------------
   LOCK / KÜLÖNBSÉG
-------------------------- */
function toggleLock(){
    db.locked = !db.locked;
    if(!db.locked){
        db.appBalance = parseFloat(appBalance.value) || 0;
    }
    saveDB();
}

function updateDifference(){
    db.companyBalance = parseFloat(companyBalance.value) || 0;
    saveDB();
}

/* -------------------------
   IDŐVONAL
-------------------------- */
function renderTimeline(day){
    let events = [];

    if(day.start)
        events.push({time:day.start, label:"🟢 Munkakezdés"});

    day.breaks.forEach(b=>{
        if(b.start) events.push({time:b.start, label:"☕ Szünet kezdete"});
        if(b.end)   events.push({time:b.end,   label:"🔙 Szünet vége"});
    });

    if(day.end)
        events.push({time:day.end, label:"⛔ Munka vége"});

    events.sort((a,b)=>a.time.localeCompare(b.time));

    timeline.innerHTML = "";
    events.forEach(e=>{
        timeline.innerHTML += `
            <div class="entry">${e.label}: <span>${e.time}</span></div>
        `;
    });
}

/* -------------------------
   TÚLÓRA FORMÁZÁS – EREDETI, JÓ VERZIÓ
-------------------------- */
function formatOvertime(overtimeHours){
    let minutes = Math.round(overtimeHours * 60);
    let sign = minutes >= 0 ? "+" : "-";
    let color = minutes >= 0 ? "var(--success)" : "var(--danger)";

    return `
        <span style="color:${color}; font-weight:700;">
            ${sign}${Math.abs(overtimeHours).toFixed(2)}
        </span>
        <span style="color:${color};">
            (${sign}${Math.abs(minutes)} perc)
        </span>
    `;
}

/* -------------------------
   FŐ UI FRISSÍTÉS
-------------------------- */
function updateUI(){
    /* LOCK */
    lockStateBox.innerHTML = db.locked
        ? "🔒 Zárolva – feloldáshoz koppintson"
        : "🔓 Feloldva – szerkeszthető";

    lockStateBox.style.background = db.locked ? "#7f1d1d" : "#14532d";
    appBalance.readOnly = db.locked;

    appBalance.value = db.appBalance;
    companyBalance.value = db.companyBalance;

    let diff = db.companyBalance - db.appBalance;
    balanceDiff.innerText = diff.toFixed(2);
    balanceDiff.style.color = diff>=0 ? "var(--success)" : "var(--danger)";

    /* TÚLÓRA LISTA */
    overtimeList.innerHTML = "";
    let total = 0;

    Object.keys(db.days).forEach(d=>{
        let day = db.days[d];
        let presence = diffTime(day.start, day.end);
        let breakSec = 0; 
        day.breaks.forEach(b=>breakSec += diffTime(b.start,b.end));

        let net = presence - breakSec;
        if(net < 0) net = 0;

        let overtime = day.manualOvertime !== undefined
            ? day.manualOvertime
            : (net/3600) - 8;

        total += overtime;

        overtimeList.innerHTML += `
            <div class="entry"><b>${d}</b> – ${overtime.toFixed(2)} óra</div>
        `;
    });

    totalOvertime.innerText = total.toFixed(2);

    /* MAI NAP */
    let d = today();
    if(db.days[d]){
        let day = db.days[d];

        let presence = diffTime(day.start, day.end);
        let breakSec = 0;
        day.breaks.forEach(b=>breakSec += diffTime(b.start,b.end));

        let net = presence - breakSec;
        if(net < 0) net = 0;

        let overtime = day.manualOvertime !== undefined
            ? day.manualOvertime
            : (net/3600) - 8;

        today_presence.innerText = format(presence);
        today_breaks.innerText   = format(breakSec);
        today_overtime.innerHTML = day.end ? formatOvertime(overtime) : "—";

        renderTimeline(day);
    }
}

/* -------------------------
   NAPTÁR LOGIKA
-------------------------- */
let currentCalendarDay = today();
let currentYear = new Date().getFullYear();
let currentMonth = new Date().getMonth();

function renderCalendar(){
    const cal = document.getElementById("calendar");
    cal.innerHTML = "";

    const first = new Date(currentYear, currentMonth, 1);
    const last = new Date(currentYear, currentMonth+1, 0);
    const daysInMonth = last.getDate();
    const startWeekday = first.getDay();

    const monthNames = [
        "Január","Február","Március","Április","Május","Június",
        "Július","Augusztus","Szeptember","Október","November","December"
    ];

    document.getElementById("month-title").innerText =
        `${monthNames[currentMonth]} ${currentYear}`;

    for(let i=0;i<startWeekday;i++){
        const empty = document.createElement("div");
        cal.appendChild(empty);
    }

    for(let d=1; d<=daysInMonth; d++){
        const dateKey = `${currentYear}-${String(currentMonth+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
        const el = document.createElement("div");
        el.className = "calendar-day";
        el.textContent = d;

        if(dateKey === today()) el.classList.add("today");
        if(dateKey === currentCalendarDay) el.classList.add("selected");

        el.onclick = ()=>{
            currentCalendarDay = dateKey;
            renderDaySummary(dateKey);
            highlightCalendarSelection();
        };

        cal.appendChild(el);
    }
}

function highlightCalendarSelection(){
    const days = document.querySelectorAll("#calendar .calendar-day");
    days.forEach(d=>{
        d.classList.remove("selected");
        const dayNum = d.textContent;
        const dateKey = `${currentYear}-${String(currentMonth+1).padStart(2,"0")}-${String(dayNum).padStart(2,"0")}`;
        if(dateKey === currentCalendarDay){
            d.classList.add("selected");
        }
    });
}

function prevMonth(){
    currentMonth--;
    if(currentMonth < 0){
        currentMonth = 11;
        currentYear--;
    }
    renderCalendar();
    renderDaySummary(currentCalendarDay);
}

function nextMonth(){
    currentMonth++;
    if(currentMonth > 11){
        currentMonth = 0;
        currentYear++;
    }
    renderCalendar();
    renderDaySummary(currentCalendarDay);
}

function renderDaySummary(dateKey){
    const daySummary = document.getElementById("day-summary");
    const day = db.days[dateKey];

    if(!day){
        daySummary.innerHTML = `
            <h3>${dateKey}</h3>
            <p>Nincs adat ehhez a naphoz.</p>
        `;
        return;
    }

    let presence = diffTime(day.start, day.end);
    let breakSec = 0; 
    day.breaks.forEach(b=>breakSec += diffTime(b.start,b.end));

    let net = presence - breakSec;
    if(net < 0) net = 0;

    let overtime = day.manualOvertime !== undefined
        ? day.manualOvertime
        : (net/3600) - 8;

    const overtimeClass = overtime >= 0 ? "overtime-positive" : "overtime-negative";

    daySummary.innerHTML = `
        <h3>${dateKey}</h3>

        <div class="row">
            <span>Munka kezdete:</span>
            <span>${day.start ?? "—"}</span>
        </div>

        <div class="row">
            <span>Szünetek:</span>
            <span>${day.breaks.length} db</span>
        </div>

        <div class="row">
            <span>Munka vége:</span>
            <span>${day.end ?? "—"}</span>
        </div>

        <div class="row">
            <span>Túlóra:</span>
            <span class="${overtimeClass}">${overtime.toFixed(2)} óra</span>
        </div>
    `;
}

function initCalendarPage(){
    currentCalendarDay = today();
    currentYear = new Date().getFullYear();
    currentMonth = new Date().getMonth();
    renderCalendar();
    renderDaySummary(currentCalendarDay);
}

/* -------------------------
   INIT
-------------------------- */
loadDB();

</script>

</body>
</html>
