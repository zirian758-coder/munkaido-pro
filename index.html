<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Munkaidő PRO v2.2 FINAL + Overtime PRO</title>

<style>
:root {
  --bg:#0c0d10;
  --fg:#ffffff;
  --card:#16181d;
  --muted:#8a8f99;
  --accent:#3b82f6;
  --danger:#ef4444;
  --success:#22c55e;
}

body {
  margin:0;
  background:var(--bg);
  color:var(--fg);
  font-family:-apple-system,system-ui;
}

.app {
  padding:16px 14px 100px;
  max-width:900px;
  margin:auto;
}

.page { display:none; }
.page.active { display:block; }

.card {
  background:var(--card);
  padding:18px;
  border-radius:22px;
  margin:18px 0;
  border:1px solid #1f2126;
}

.card-title {
  font-size:18px;
  font-weight:600;
  margin-bottom:12px;
}

button {
  width:100%;
  padding:14px;
  border-radius:16px;
  border:none;
  margin:8px 0;
  font-size:16px;
  color:#fff;
  font-weight:600;
  background:#2563eb;
  cursor:pointer;
}

.btn-start { background:#16a34a; }
.btn-break { background:#d97706; }
.btn-end { background:#dc2626; }

input {
  padding:8px 10px;
  border-radius:10px;
  border:1px solid #2a2d33;
  background:#0f1115;
  color:#fff;
  font-size:14px;
}

/* Reset gomb */
.reset-top-btn {
  position:absolute;
  top:12px;
  right:16px;
  background:var(--card);
  color:var(--fg);
  border:1px solid #1f2126;
  width:38px;
  height:38px;
  border-radius:12px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:20px;
  cursor:pointer;
  z-index:9999;
  pointer-events:auto;
}

.card, .page, .app {
  position:relative;
  z-index:1;
  pointer-events:auto;
}

/* Alsó NAV */
.bottom-nav {
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  background:#111318ee;
  backdrop-filter:blur(14px);
  display:flex;
  justify-content:space-between;
  padding:10px 12px;
  border-top:1px solid #2a2d33;
}

.nav-item {
  flex:1;
  text-align:center;
  color:var(--muted);
  padding:6px 0;
  border-radius:12px;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:2px;
  cursor:pointer;
}

.nav-item.active {
  color:#fff;
  background:#2563eb33;
}

.nav-icon { font-size:20px; }
.nav-label { font-size:11px; }

/* Settings */
.settings-list {
  background:var(--card);
  border-radius:18px;
  overflow:hidden;
  border:1px solid #1f2126;
}

.settings-item {
  display:flex;
  align-items:center;
  padding:16px;
  border-bottom:1px solid #1f2126;
  cursor:pointer;
}

.settings-item:last-child {
  border-bottom:none;
}

.settings-flag {
  font-size:24px;
  margin-right:14px;
}

.settings-arrow {
  margin-left:auto;
  font-size:18px;
  color:#8a8f99;
}

/* Sorok */
.row {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:6px 0;
  font-size:15px;
}

/* Naptár */
#calendar {
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:6px;
}

.calendar-day {
  padding:8px 0;
  text-align:center;
  border-radius:10px;
  background:#111318;
  cursor:pointer;
  font-size:13px;
}

.calendar-day.today {
  border:1px solid var(--accent);
}

.calendar-day.selected {
  background:#2563eb55;
}

/* Kiemelések */
.metric-value {
  font-size:22px;
  font-weight:700;
  margin-top:4px;
}

.overtime-positive { color:var(--success); }
.overtime-negative { color:var(--danger); }

.entry {
  font-size:14px;
  padding:4px 0;
}

/* Túlóra PRO */
#page-overtime input {
  width:120px;
  text-align:right;
}

#ot_daily_list .entry {
  padding:4px 0;
  font-size:14px;
}

.ot-positive { color:var(--success); font-weight:600; }
.ot-negative { color:var(--danger); font-weight:600; }
</style>
</head>
<body>

<div class="app">

<!-- MA OLDAL -->
<div id="page-home" class="page active">

  <div class="reset-top-btn" onclick="resetToday()">⟳</div>

  <div class="card">
    <div class="card-title" data-i18n="work_buttons"></div>
    <button class="btn-start" onclick="startWork()" data-i18n="start_work"></button>
    <button class="btn-break" onclick="startBreak()" data-i18n="break_start"></button>
    <button class="btn-break" onclick="endBreak()" data-i18n="break_end"></button>
    <button class="btn-end" onclick="endWork()" data-i18n="end_work"></button>
  </div>

  <div class="card">
    <div class="card-title" data-i18n="details"></div>
    <div id="timeline"></div>
  </div>

  <div class="card">
    <div class="card-title" data-i18n="summary"></div>

    <div class="row">
      <span data-i18n="presence_total"></span>
      <span id="sum_presence">00:00:00</span>
    </div>

    <div class="row">
      <span data-i18n="work_total"></span>
      <span id="sum_work">00:00:00</span>
    </div>

    <div class="row">
      <span data-i18n="break_total"></span>
      <span id="sum_break">00:00:00</span>
    </div>

    <div class="row">
      <span data-i18n="overtime"></span>
      <span id="sum_overtime">—</span>
    </div>
  </div>

</div>

<!-- NAPTÁR OLDAL -->
<div id="page-calendar" class="page">

  <div class="card">
    <div class="row" style="justify-content:space-between;">
      <button onclick="prevMonth()">⬅️</button>
      <span id="month-title"></span>
      <button onclick="nextMonth()">➡️</button>
    </div>
  </div>

  <div id="day-summary" class="card"></div>
  <div id="calendar" class="card"></div>
  <div id="month-total" class="card"></div>

</div>

<!-- TÚLÓRA PRO OLDAL -->
<div id="page-overtime" class="page">

  <div class="card">
    <div class="card-title">⏱️ Túlóra PRO</div>

    <div class="row">
      <span>App induló túlóra</span>
      <input id="ot_app_base" type="number" step="0.01" placeholder="pl. 12.75"
             oninput="updateOvertimeBase()">
    </div>

    <div class="row">
      <span>App aktuális túlóra</span>
      <span id="ot_app_current">0.00</span>
    </div>

    <div class="row">
      <span>Céges túlóra</span>
      <input id="ot_company" type="number" step="0.01" placeholder="pl. 14.50"
             oninput="updateCompanyOvertime()">
    </div>

    <div class="row">
      <span>Különbség</span>
      <span id="ot_diff">0.00</span>
    </div>

    <div class="row">
      <span>Mai módosítás</span>
      <span id="ot_today_change">0.00</span>
    </div>
  </div>

  <div class="card">
    <div class="card-title">📅 Napi túlórák</div>
    <div id="ot_daily_list"></div>
  </div>

  <div class="card">
    <div class="card-title">📊 Havi összesítés</div>
    <div id="ot_month_total"></div>
  </div>

</div>

<!-- BEÁLLÍTÁSOK OLDAL -->
<div id="page-settings" class="page">

  <div class="card">
    <div class="card-title" data-i18n="language"></div>

    <div class="settings-list">

      <div class="settings-item" onclick="setLanguage('hu')">
        <div class="settings-flag">🇭🇺</div>
        <div data-i18n="lang_hu"></div>
        <div class="settings-arrow">›</div>
      </div>

      <div class="settings-item" onclick="setLanguage('de')">
        <div class="settings-flag">🇩🇪</div>
        <div data-i18n="lang_de"></div>
        <div class="settings-arrow">›</div>
      </div>

    </div>
  </div>

</div>

</div><!-- app -->

<!-- NAV -->
<div class="bottom-nav">

  <div id="nav-page-home" class="nav-item active"
       onclick="showPage('page-home')">
    <div class="nav-icon">🏠</div>
    <div class="nav-label" data-i18n="nav_home"></div>
  </div>

  <div id="nav-page-calendar" class="nav-item"
       onclick="showPage('page-calendar'); initCalendarPage();">
    <div class="nav-icon">📅</div>
    <div class="nav-label" data-i18n="nav_calendar"></div>
  </div>

  <div id="nav-page-overtime" class="nav-item"
       onclick="showPage('page-overtime'); updateOvertimeUI();">
    <div class="nav-icon">⏱️</div>
    <div class="nav-label">Túlóra</div>
  </div>

  <div id="nav-page-settings" class="nav-item"
       onclick="showPage('page-settings')">
    <div class="nav-icon">⚙️</div>
    <div class="nav-label" data-i18n="nav_settings"></div>
  </div>

</div>

<script>
const LANG = {
  hu: {
    work_buttons: "Munka gombok",
    summary: "📊 Összesített adatok",
    presence_total: "Jelenlét",
    work_total: "Munkaidő",
    break_total: "Szünet",
    overtime: "Túlóra",
    start_work: "▶ Munkakezdés",
    break_start: "☕ Szünet kezdete",
    break_end: "🔙 Szünet vége",
    end_work: "⏹ Munka vége",
    details: "Részletek",
    breaks: "Szünetek",
    language: "🌐 Nyelv",
    lang_hu: "Magyar",
    lang_de: "Deutsch",
    nav_home: "Ma",
    nav_calendar: "Naptár",
    nav_settings: "Beállítások",
    no_data: "Nincs adat erre a napra.",
    daily_overtime_list: "Havi túlóra összesítés"
  },
  de: {
    work_buttons: "Arbeitssteuerung",
    summary: "📊 Zusammenfassung",
    presence_total: "Anwesenheit",
    work_total: "Arbeitszeit",
    break_total: "Pause",
    overtime: "Überstunden",
    start_work: "▶ Arbeitsbeginn",
    break_start: "☕ Pause Start",
    break_end: "🔙 Pause Ende",
    end_work: "⏹ Arbeitsende",
    details: "Details",
    breaks: "Pausen",
    language: "🌐 Sprache",
    lang_hu: "Ungarisch",
    lang_de: "Deutsch",
    nav_home: "Heute",
    nav_calendar: "Kalender",
    nav_settings: "Einstellungen",
    no_data: "Keine Daten für diesen Tag.",
    daily_overtime_list: "Monatliche Überstunden"
  }
};

let db = {
  days: {},
  language: "hu",
  appBaseOvertime: 0,   // tizedes óra
  companyOvertime: 0    // tizedes óra
};

function today(){ return new Date().toISOString().slice(0,10); }
function now(){ return new Date().toTimeString().slice(0,8); }
function pad(n){ return n.toString().padStart(2,"0"); }

function diffTime(a,b){
  if(!a||!b) return 0;
  return (new Date("2000-01-01 "+b) - new Date("2000-01-01 "+a)) / 1000;
}

function format(sec){
  let h = Math.floor(sec/3600);
  let m = Math.floor((sec%3600)/60);
  let s = sec % 60;
  return `${pad(h)}:${pad(m)}:${pad(s)}`;
}

function t(key){
  return LANG[db.language][key] || key;
}

function applyTranslations(){
  document.querySelectorAll("[data-i18n]").forEach(el=>{
    el.innerText = t(el.getAttribute("data-i18n"));
  });
}

function loadDB(){
  let r = localStorage.getItem("munkapro_v22_final_overtime");
  if(r) db = JSON.parse(r);
  applyTranslations();
  updateUI();
  updateOvertimeUI();
  // mezők kitöltése
  const base = document.getElementById("ot_app_base");
  const comp = document.getElementById("ot_company");
  if(base) base.value = db.appBaseOvertime.toFixed(2);
  if(comp) comp.value = db.companyOvertime.toFixed(2);
}

function saveDB(){
  localStorage.setItem("munkapro_v22_final_overtime", JSON.stringify(db));
  applyTranslations();
  updateUI();
  updateOvertimeUI();
}

function showPage(id){
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.getElementById(id).classList.add("active");

  document.querySelectorAll(".nav-item").forEach(n=>n.classList.remove("active"));
  document.getElementById("nav-"+id).classList.add("active");

  updateUI();
  if(id==="page-overtime") updateOvertimeUI();
}

function setLanguage(lang){
  db.language = lang;
  saveDB();
}

function resetToday(){
  let d = today();
  db.days[d] = {
    start:null,
    end:null,
    breaks:[],
    workSegments:[],
    presence:0,
    workTime:0,
    breakTime:0,
    overtime:0
  };
  saveDB();
}

function ensure(d){
  if(!db.days[d]){
    db.days[d] = {
      start:null,
      end:null,
      breaks:[],
      workSegments:[],
      presence:0,
      workTime:0,
      breakTime:0,
      overtime:0
    };
  }
  if(!db.days[d].workSegments) db.days[d].workSegments = [];
  return db.days[d];
}

/* Munka / szünet logika */
function startWork(){
  let d = today();
  let day = ensure(d);
  if(day.start) return;
  day.start = now();
  day.workSegments.push({ start: day.start, end:null });
  saveDB();
}

function startBreak(){
  let d = today();
  let day = ensure(d);
  if(!day.start) return;
  if(day.breaks.some(b=>!b.end)) return;

  let seg = day.workSegments;
  if(seg.length && seg[seg.length-1].end === null){
    seg[seg.length-1].end = now();
  }

  day.breaks.push({ start: now(), end:null });
  saveDB();
}

function endBreak(){
  let d = today();
  let day = ensure(d);
  let br = day.breaks;
  if(!br.length || br[br.length-1].end !== null) return;

  br[br.length-1].end = now();
  day.workSegments.push({ start: now(), end:null });
  saveDB();
}

function endWork(){
  let d = today();
  let day = ensure(d);
  if(!day.start || day.end) return;
  if(day.breaks.some(b=>!b.end)) return;

  day.end = now();

  let seg = day.workSegments;
  if(seg.length && seg[seg.length-1].end === null){
    seg[seg.length-1].end = day.end;
  }

  day.presence = diffTime(day.start, day.end);

  day.breakTime = 0;
  day.breaks.forEach(b=>{
    day.breakTime += diffTime(b.start, b.end);
  });

  day.workTime = 0;
  seg.forEach(s=>{
    day.workTime += diffTime(s.start, s.end);
  });

  // szünet többlet 30 perc felett
  const extraBreakSec = Math.max(0, day.breakTime - 1800);
  const extraBreakHours = extraBreakSec / 3600;

  // napi túlóra (tizedes óra)
  day.overtime = (day.workTime/3600 - 8) - extraBreakHours;

  saveDB();
}

/* Timeline */
function renderTimeline(day){
  const tl = document.getElementById("timeline");
  tl.innerHTML = "";
  if(!day) return;

  let events = [];
  if(day.start) events.push({ time: day.start, label: t("start_work") });
  day.breaks.forEach(b=>{
    if(b.start) events.push({ time:b.start, label:t("break_start") });
    if(b.end)   events.push({ time:b.end,   label:t("break_end") });
  });
  if(day.end) events.push({ time: day.end, label: t("end_work") });

  events.sort((a,b)=>a.time.localeCompare(b.time));

  events.forEach(e=>{
    tl.innerHTML += `<div class="entry">${e.label}: <span>${e.time}</span></div>`;
  });
}

/* UI frissítés (Ma + Naptár) */
let currentCalendarDay = today();
let currentYear = new Date().getFullYear();
let currentMonth = new Date().getMonth();

const monthsHU = [
  "Január","Február","Március","Április","Május","Június",
  "Július","Augusztus","Szeptember","Október","November","December"
];
const monthsDE = [
  "Januar","Februar","März","April","Mai","Juni",
  "Juli","August","September","Oktober","November","Dezember"
];

function formatDateDE(dateKey){
  const [y,m,d] = dateKey.split("-");
  return `${d}.${m}.${y}`;
}

function updateUI(){
  let d = today();
  let day = db.days[d];

  if(day){
    renderTimeline(day);
    sum_presence.innerText = format(day.presence || 0);
    sum_work.innerText     = format(day.workTime || 0);
    sum_break.innerText    = format(day.breakTime || 0);
    sum_overtime.innerText = (day.overtime || 0).toFixed(2);
  } else {
    timeline.innerHTML = "";
    sum_presence.innerText = "00:00:00";
    sum_work.innerText     = "00:00:00";
    sum_break.innerText    = "00:00:00";
    sum_overtime.innerText = "—";
  }

  if(document.getElementById("page-calendar").classList.contains("active")){
    renderCalendar();
    renderDaySummary(currentCalendarDay);
  }
}

/* Naptár */
function renderCalendar(){
  const cal = document.getElementById("calendar");
  const monthTotal = document.getElementById("month-total");
  cal.innerHTML = "";

  const first = new Date(currentYear, currentMonth, 1);
  const last = new Date(currentYear, currentMonth+1, 0);
  const daysInMonth = last.getDate();
  const startWeekday = first.getDay();

  const monthNames = db.language==="hu" ? monthsHU : monthsDE;
  document.getElementById("month-title").innerText =
    `${monthNames[currentMonth]} ${currentYear}`;

  for(let i=0;i<startWeekday;i++){
    const empty = document.createElement("div");
    cal.appendChild(empty);
  }

  for(let d=1; d<=daysInMonth; d++){
    const dateKey = `${currentYear}-${String(currentMonth+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
    const el = document.createElement("div");
    el.className = "calendar-day";
    el.textContent = d;

    if(dateKey === today()) el.classList.add("today");
    if(dateKey === currentCalendarDay) el.classList.add("selected");

    el.onclick = ()=>{
      currentCalendarDay = dateKey;
      renderDaySummary(dateKey);
      highlightCalendarSelection();
    };

    cal.appendChild(el);
  }

  const total = calculateMonthTotal(currentYear, currentMonth);
  const sign = total >= 0 ? "+" : "-";
  const color = total >= 0 ? "var(--success)" : "var(--danger)";

  monthTotal.innerHTML = `
    ${t("daily_overtime_list")}: 
    <span style="color:${color}; font-weight:700;">
      ${sign}${Math.abs(total).toFixed(2)} h
    </span>
  `;
}

function calculateMonthTotal(year, month){
  let total = 0;
  Object.keys(db.days).forEach(dateKey=>{
    const d = new Date(dateKey);
    if(d.getFullYear()===year && d.getMonth()===month){
      total += db.days[dateKey].overtime || 0;
    }
  });
  return total;
}

function highlightCalendarSelection(){
  const days = document.querySelectorAll("#calendar .calendar-day");
  days.forEach(d=>{
    d.classList.remove("selected");
    const dayNum = d.textContent;
    const dateKey = `${currentYear}-${String(currentMonth+1).padStart(2,"0")}-${String(dayNum).padStart(2,"0")}`;
    if(dateKey === currentCalendarDay){
      d.classList.add("selected");
    }
  });
}

function prevMonth(){
  currentMonth--;
  if(currentMonth < 0){
    currentMonth = 11;
    currentYear--;
  }
  renderCalendar();
  renderDaySummary(currentCalendarDay);
}

function nextMonth(){
  currentMonth++;
  if(currentMonth > 11){
    currentMonth = 0;
    currentYear++;
  }
  renderCalendar();
  renderDaySummary(currentCalendarDay);
}

function renderDaySummary(dateKey){
  const box = document.getElementById("day-summary");
  const day = db.days[dateKey];

  if(!day){
    box.innerHTML = `
      <h3>${db.language==="hu" ? dateKey : formatDateDE(dateKey)}</h3>
      <p>${t("no_data")}</p>
    `;
    return;
  }

  let breaksHTML = "";
  if(day.breaks.length === 0){
    breaksHTML = "—";
  } else {
    day.breaks.forEach(b=>{
      breaksHTML += `<div>${b.start ?? "—"} → ${b.end ?? "—"}</div>`;
    });
  }

  const overtimeClass = day.overtime >= 0 ? "overtime-positive" : "overtime-negative";

  box.innerHTML = `
    <h3>${db.language==="hu" ? dateKey : formatDateDE(dateKey)}</h3>

    <div class="row">
      <span>${t("start_work")}:</span>
      <span>${day.start ?? "—"}</span>
    </div>

    <div class="row">
      <span>${t("breaks")}:</span>
      <span>${breaksHTML}</span>
    </div>

    <div class="row">
      <span>${t("end_work")}:</span>
      <span>${day.end ?? "—"}</span>
    </div>

    <hr style="border-color:#333;margin:10px 0;">

    <div class="row">
      <span>${t("presence_total")}:</span>
      <span>${format(day.presence)}</span>
    </div>

    <div class="row">
      <span>${t("work_total")}:</span>
      <span>${format(day.workTime)}</span>
    </div>

    <div class="row">
      <span>${t("break_total")}:</span>
      <span>${format(day.breakTime)}</span>
    </div>

    <div class="row">
      <span>${t("overtime")}:</span>
      <span class="${overtimeClass}">${day.overtime.toFixed(2)} h</span>
    </div>
  `;
}

function initCalendarPage(){
  currentCalendarDay = today();
  currentYear = new Date().getFullYear();
  currentMonth = new Date().getMonth();
  renderCalendar();
  renderDaySummary(currentCalendarDay);
}

/* Túlóra PRO logika */
function updateOvertimeBase(){
  const base = parseFloat(document.getElementById("ot_app_base").value.replace(",", ".")) || 0;
  db.appBaseOvertime = base;
  saveDB();
}

function updateCompanyOvertime(){
  const comp = parseFloat(document.getElementById("ot_company").value.replace(",", ".")) || 0;
  db.companyOvertime = comp;
  saveDB();
}

function updateOvertimeUI(){
  const base = db.appBaseOvertime || 0;
  const comp = db.companyOvertime || 0;

  let totalDaily = 0;
  let todayChange = 0;
  const todayKey = today();

  const dates = Object.keys(db.days).sort();
  dates.forEach(k=>{
    const d = db.days[k];
    const ot = d.overtime || 0;
    totalDaily += ot;
    if(k === todayKey) todayChange = ot;
  });

  const appCurrent = base + totalDaily;
  const diff = comp - appCurrent;

  const appEl = document.getElementById("ot_app_current");
  const diffEl = document.getElementById("ot_diff");
  const todayEl = document.getElementById("ot_today_change");
  const listEl = document.getElementById("ot_daily_list");
  const monthEl = document.getElementById("ot_month_total");

  if(!appEl || !diffEl || !todayEl || !listEl || !monthEl) return;

  appEl.innerText = appCurrent.toFixed(2);
  todayEl.innerText = todayChange.toFixed(2);

  const diffClass = diff >= 0 ? "ot-positive" : "ot-negative";
  diffEl.className = diffClass;
  diffEl.innerText = diff.toFixed(2);

  listEl.innerHTML = "";
  const nowDate = new Date();
  const y = nowDate.getFullYear();
  const m = nowDate.getMonth();
  let monthTotal = 0;

  dates.forEach(k=>{
    const d = new Date(k);
    const ot = db.days[k].overtime || 0;
    const cls = ot >= 0 ? "ot-positive" : "ot-negative";
    const sign = ot >= 0 ? "+" : "";
    listEl.innerHTML += `
      <div class="entry">
        <span>${k}</span>
        <span class="${cls}">${sign}${ot.toFixed(2)} h</span>
      </div>
    `;
    if(d.getFullYear()===y && d.getMonth()===m){
      monthTotal += ot;
    }
  });

  const mSign = monthTotal >= 0 ? "+" : "";
  const mClass = monthTotal >= 0 ? "ot-positive" : "ot-negative";
  monthEl.innerHTML = `
    <div class="${mClass}">
      Aktuális hónap: ${mSign}${monthTotal.toFixed(2)} h
    </div>
  `;
}

loadDB();
</script>

</body>
</html>
